services:
  docshift-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-docshift}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-docshift123}
      POSTGRES_DB: ${POSTGRES_DB:-docshift}
    volumes:
      - docshift_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-docshift}"]
      interval: 5s
      timeout: 5s
      retries: 5

  docshift-prod:
    build:
      context: .
      dockerfile: Dockerfile.prod
    ports:
      - "3031:3000"
    env_file:
      - .env.local
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-docshift}:${POSTGRES_PASSWORD:-docshift123}@docshift-db:5432/${POSTGRES_DB:-docshift}
    depends_on:
      docshift-db:
        condition: service_healthy
    command: node server.js

volumes:
  docshift_db_data:

services:
  docshift-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: docshift
      POSTGRES_PASSWORD: docshift123
      POSTGRES_DB: docshift
    ports:
      - "5435:5432"
    volumes:
      - docshift_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docshift"]
      interval: 5s
      timeout: 5s
      retries: 5

  docshift-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3030:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    env_file:
      - .env.local
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://docshift:docshift123@docshift-db:5432/docshift
      NEXTAUTH_URL: http://localhost:3030
    depends_on:
      docshift-db:
        condition: service_healthy
    command: sh -c "npm install && node scripts/migrate.mjs && npm run dev"

volumes:
  docshift_db_data:

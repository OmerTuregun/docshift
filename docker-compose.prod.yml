services:
  docshift-db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-docshift}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-docshift123}
      POSTGRES_DB: ${POSTGRES_DB:-docshift}
    volumes:
      - docshift_db_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-docshift}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - docshift-net

  docshift-app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    ports:
      - "3031:3000"
    env_file:
      - .env.production
    depends_on:
      docshift-db:
        condition: service_healthy
    command: sh -c "node scripts/migrate.mjs && node server.js"
    networks:
      - docshift-net

volumes:
  docshift_db_prod:

networks:
  docshift-net:
    driver: bridge
